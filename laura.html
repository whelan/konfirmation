<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julequiz</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #0b3d2e, #145a32);
            font-family: "Segoe UI", sans-serif;
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            width: 320px;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
        }

        input {
            width: 100%;
            padding: 0.7rem;
            margin-top: 1rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }

        button {
            margin-top: 1rem;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            background: #c0392b;
            color: #fff;
        }

        #result {
            margin-top: 1.2rem;
            font-weight: bold;
        }
                        @media (max-width: 600px) {
            body {
                flex-direction: column;
                padding: 1rem;
                font-size: 1.2rem;
            }

            .card {
                width: 90%;
                padding: 1.5rem;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            input,
            button {
                font-size: 1rem;
            }

            #result {
                font-size: 1rem;
            }
        }

    </style>
</head>
<body>
    <div class="card">
        <h1>🎄 Julegåden 🎄</h1>
        <p>Hvad hedder manden bag juleeventyret?</p>

        <input id="answer" type="text" placeholder="Skriv dit svar her">
        <button onclick="checkAnswer()">Tjek</button>

        <div id="result"></div>
    </div>

    <script>
        function checkAnswer() {
            const input = document.getElementById("answer").value.trim();
            const result = document.getElementById("result");

            if (input === "Ørsted" || input === "ørsted") {
                // Valgfrit: kort feedback før redirect
                result.textContent = "🎉 Korrekt – videresender…";
                result.style.color = "#2ecc71";

                setTimeout(() => {
                    window.location.href = "https://whelan.github.io/konfirmation/Side2.html";
                }, 800);
            } else {
                result.textContent = "Prøv igen";
                result.style.color = "#f1c40f";
            }
        }
    </script>
</body>
</html>
