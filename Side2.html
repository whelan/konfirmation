<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julequiz</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #0b3d2e, #145a32);
            font-family: "Segoe UI", sans-serif;
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            width: 320px;
        }
        
        h1 {
            margin-top: 0;
            font-size: 1.8rem;
        }

        input {
            width: 100%;
            padding: 0.7rem;
            margin-top: 1rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }

        button {
            margin-top: 1rem;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            background: #c0392b;
            color: #fff;
        }

        #result {
            margin-top: 1.2rem;
            font-weight: bold;
        }
                @media (max-width: 600px) {
            body {
                flex-direction: column;
                padding: 1rem;
                font-size: 1.2rem;
            }

            .card {
                width: 90%;
                padding: 1.5rem;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            input,
            button {
                font-size: 1rem;
            }

            #result {
                font-size: 1rem;
            }
        }

    </style>
</head>
<body>
    <div class="card">
        <h1>🎄 Julegåden 🎄</h1>
        <p>HjkVipAswDtd</p>      
        <p>HwsEghDioDwqExcRaq</p>
        <p>DpåErwTty</p>
        <p>BcvEyuDqwSopTczExs</p>
        <p>DytAewNqwSnmKtdEjs</p>
        <p>FrtOgbDklBopOåøLabDrwHmxOytLvaDut?</p>
        <br>
        <br>
        <span style="color:black">Send SMS til Jannie med svaret</span>
    </div>
</body>
</html>
