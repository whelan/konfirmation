<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmationsspørgsmål</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #ffd700, #ffed4e);
            font-family: "Segoe UI", sans-serif;
            color: #333;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 320px;
        }
        
        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: #d4a017;
        }

        p {
            color: #333;
            margin: 0.5rem 0;
        }

        button {
            margin-top: 1rem;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            background: #d4a017;
            color: #fff;
            font-weight: bold;
        }

        button:hover {
            background: #c4900f;
        }

        @media (max-width: 600px) {
            body {
                flex-direction: column;
                padding: 1rem;
                font-size: 1.2rem;
            }

            .card {
                width: 90%;
                padding: 1.5rem;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            button {
                font-size: 1rem;
            }
        }

    </style>
</head>
<body>
    <div class="card">
        <h1>🧸 ✝️ Konfirmation 📖</h1>
        <p>HjkVipAswDtd</p>      
        <p>HwsEghDioDwqExcRaq</p>
        <p>DpåErwTty</p>
        <p>BcvEyuDqwSopTczExs</p>
        <p>DytAewNqwSnmKtdEjs</p>
        <p>FrtOgbDklBopOåøLabDrwHmxOytLvaDut?</p>
        <br>
        <br>
        <span style="color:#d4a017">Send SMS til Jannie med svaret</span>
    </div>
</body>
</html>
