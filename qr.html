<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Kode - Konfirmation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #ffd700, #ffed4e);
            font-family: "Segoe UI", sans-serif;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: #d4a017;
        }

        #qrcode {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            display: inline-block;
            border: 3px solid #d4a017;
        }

        p {
            margin-top: 1.5rem;
            font-size: 1rem;
            color: #333;
        }

        @media (max-width: 600px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧸 ✝️ Konfirmation 📖</h1>
        <p>Scan QR Koden</p>
        <div id="qrcode"></div>
        <p>Åbn siden på din telefon</p>
    </div>

    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://whelan.github.io/konfirmation/Laura.html",
            width: 300,
            height: 300,
            colorDark: "#d4a017",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
